name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc -b --noEmit

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    name: Build + bundle size check
    runs-on: ubuntu-latest
    env:
      VITE_MARKETPLACE_LAYOUT_V2: "true"
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Check chunk sizes (fail if any JS chunk > 600KB)
        run: |
          OVERSIZED=$(find dist/assets -name "*.js" -size +600k)
          if [ -n "$OVERSIZED" ]; then
            echo "ERROR: oversized chunks found:"
            echo "$OVERSIZED" | xargs ls -lh
            exit 1
          fi
          echo "All chunks within 600KB limit."

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [typecheck, test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    outputs:
      deployment-url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - id: deploy
        run: |
          URL=$(npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }} 2>&1 | grep -oE 'https://[^ ]+' | tail -1)
          echo "url=$URL" >> $GITHUB_OUTPUT

  smoke:
    name: E2E smoke tests
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Run smoke tests against deployed URL
        run: npx playwright test e2e/smoke.test.ts
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy.outputs.deployment-url }}
